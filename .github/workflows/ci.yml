name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (Laravel)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bulodph_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, bcmath
          coverage: xdebug

      - name: Install Composer Dependencies
        working-directory: ./bulodph-backend
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        working-directory: ./bulodph-backend
        run: cp .env.example .env

      - name: Generate Application Key
        working-directory: ./bulodph-backend
        run: php artisan key:generate

      - name: Run Migrations
        working-directory: ./bulodph-backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bulodph_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan migrate --force

      - name: Run Pest Tests
        working-directory: ./bulodph-backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: bulodph_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: ./vendor/bin/pest --coverage

      - name: Laravel Pint (Code Style)
        working-directory: ./bulodph-backend
        run: ./vendor/bin/pint --test

  frontend-tests:
    name: Frontend Tests (Vue)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./bulodph-frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./bulodph-frontend
        run: npm ci

      - name: Lint
        working-directory: ./bulodph-frontend
        run: npm run lint

      - name: Type Check
        working-directory: ./bulodph-frontend
        run: npm run type-check

      - name: Build
        working-directory: ./bulodph-frontend
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Add your deploy steps here."
          echo "Backend: Laravel Forge / Envoyer / AWS (set APP_ENV=production, APP_DEBUG=false)."
          echo "Frontend: Build from bulodph-frontend, deploy to Vercel / Netlify / Cloudflare Pages."
          echo "See README.md and docs/DEPLOYMENT.md for checklist."

